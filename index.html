<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>吉他助教</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --surface: #ffffff;
      --surface-2: #f1efe8;
      --ink: #202124;
      --muted: #6d6a62;
      --line: #d9d3c7;
      --wood: #9c5d37;
      --position: #fff4c8;
      --position-strong: #f3bd3d;
      --root: #234d9f;
      --root-bg: #e5edff;
      --scale: #e9f7f1;
      --scale-border: #4aa17b;
      --accent: #bd4b32;
      --shadow: 0 18px 50px rgba(54, 41, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(247, 244, 238, 0.96)),
        var(--bg);
      color: var(--ink);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 780;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .current-card {
      min-width: 210px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .current-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .current-card strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .mode-tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(130px, 1fr));
      gap: 4px;
      padding: 4px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .mode-tab {
      min-height: 40px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 760;
    }

    .mode-tab.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 8px rgba(32, 33, 36, 0.12);
    }

    .mode-view[hidden] {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .rhythm-controls {
      grid-template-columns: repeat(4, minmax(150px, 1fr));
    }

    .control {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .control label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    select,
    input[type="number"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    select:focus,
    input[type="number"]:focus,
    input[type="range"]:focus-visible,
    button:focus-visible {
      border-color: var(--root);
      box-shadow: 0 0 0 3px rgba(35, 77, 159, 0.16);
      outline: none;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--root);
    }

    .range-pair {
      display: grid;
      grid-template-columns: 1fr 76px;
      align-items: center;
      gap: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: end;
    }

    .action-button {
      min-height: 42px;
      border-radius: 8px;
      background: var(--root);
      color: #fff;
      font-weight: 780;
    }

    .action-button.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .action-button.active {
      background: var(--accent);
      color: #fff;
    }

    .fretboard-shell {
      overflow: hidden;
      margin-bottom: 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0;
    }

    .section-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .readout {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .fretboard-scroll,
    .notation-scroll {
      overflow-x: auto;
      padding: 12px 16px 16px;
    }

    .fretboard {
      display: grid;
      grid-template-columns: 86px repeat(25, 64px);
      grid-auto-rows: 64px;
      min-width: 1686px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: linear-gradient(90deg, #7a4427, #a26239 38%, #8d5030);
    }

    .fret-label,
    .string-label,
    .fret-cell {
      position: relative;
      border-right: 1px solid rgba(255, 255, 255, 0.16);
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .fret-label {
      display: grid;
      place-items: center;
      background: #f2eadc;
      color: #4d463b;
      font-size: 13px;
      font-weight: 750;
    }

    .corner-label {
      align-content: center;
      padding: 0 10px;
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      background: #f7f2e7;
    }

    .string-label {
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 0 12px;
      color: #fff;
      background: rgba(54, 31, 18, 0.8);
      font-weight: 750;
    }

    .string-label small {
      color: rgba(255, 255, 255, 0.72);
      font-weight: 600;
    }

    .fret-cell {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 3px;
      padding: 6px 5px;
      min-width: 0;
      color: rgba(255, 255, 255, 0.42);
      isolation: isolate;
    }

    .fret-cell::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: rgba(225, 231, 234, 0.7);
      z-index: -1;
    }

    .fret-cell::after {
      content: "";
      position: absolute;
      inset: 8px 7px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      z-index: -1;
    }

    .fret-cell.scale-note::after {
      border: 1px solid rgba(74, 161, 123, 0.48);
      background: rgba(233, 247, 241, 0.86);
    }

    .fret-cell.in-position.scale-note::after {
      border: 2px solid var(--position-strong);
      background: #fff7db;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.75);
    }

    .fret-cell.root-note::after {
      border-color: var(--root);
      background: var(--root-bg);
      box-shadow: 0 0 0 2px rgba(35, 77, 159, 0.18);
    }

    .fret-cell.outside-position {
      opacity: 0.62;
    }

    .fret-cell.position-column {
      background: rgba(255, 244, 200, 0.16);
    }

    .fret-label.position-column {
      background: var(--position);
      color: #553b00;
    }

    .position-start {
      border-left: 3px solid var(--position-strong);
    }

    .position-end {
      border-right: 3px solid var(--position-strong);
    }

    .note-name {
      color: var(--ink);
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .root-note .note-name {
      color: var(--root);
    }

    .solfege {
      color: #31533f;
      font-size: 12px;
      line-height: 1;
      font-weight: 720;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .degree {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 2fr;
      gap: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .summary-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.root-chip {
      border-color: rgba(35, 77, 159, 0.45);
      background: var(--root-bg);
      color: var(--root);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .legend-swatch.position {
      border-color: var(--position-strong);
      background: #fff7db;
    }

    .legend-swatch.root {
      border-color: var(--root);
      background: var(--root-bg);
    }

    .legend-swatch.scale {
      border-color: var(--scale-border);
      background: var(--scale);
    }

    .rhythm-status {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .status-box {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .status-box span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .status-box strong {
      font-size: 24px;
      line-height: 1.1;
    }

    .notation-panel {
      margin-bottom: 16px;
    }

    .notation {
      display: block;
      min-width: 720px;
      width: 100%;
      height: auto;
      color: var(--ink);
    }

    .pattern-bank {
      padding: 16px;
    }

    .pattern-bank h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .answer-panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .answer-panel[hidden] {
      display: none;
    }

    .answer-panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .answer-text {
      margin: 0;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 1120px) {
      .rhythm-controls {
        grid-template-columns: repeat(3, minmax(160px, 1fr));
      }
    }

    @media (max-width: 980px) {
      .app {
        padding: 18px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .current-card {
        min-width: 0;
      }

      .controls,
      .summary-grid,
      .rhythm-status {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      .title-block h1 {
        font-size: 26px;
      }

      .mode-tabs {
        width: 100%;
      }

      .controls,
      .summary-grid,
      .rhythm-controls,
      .rhythm-status {
        grid-template-columns: 1fr;
      }

      .section-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .fretboard-scroll,
      .notation-scroll {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <h1>吉他助教</h1>
        <p>调式指板推演与十六分节奏练习</p>
      </div>
      <div class="current-card" aria-live="polite">
        <span id="currentLabel">当前调式</span>
        <strong id="currentValue">C Ionian</strong>
      </div>
    </header>

    <nav class="mode-tabs" aria-label="练习模式">
      <button class="mode-tab active" type="button" data-mode="scale" aria-pressed="true">调式指板</button>
      <button class="mode-tab" type="button" data-mode="rhythm" aria-pressed="false">十六分节奏</button>
    </nav>

    <section id="scaleMode" class="mode-view">
      <section class="panel controls" aria-label="调式和把位控制">
        <div class="control">
          <label for="rootSelect">主音</label>
          <select id="rootSelect"></select>
        </div>
        <div class="control">
          <label for="modeSelect">调式</label>
          <select id="modeSelect"></select>
        </div>
        <div class="control">
          <label for="startFret">起始品</label>
          <div class="range-pair">
            <input id="startFret" type="range" min="0" max="24" value="5">
            <input id="startFretNumber" type="number" min="0" max="24" value="5" inputmode="numeric">
          </div>
        </div>
        <div class="control">
          <label for="spanSelect">跨度</label>
          <select id="spanSelect">
            <option value="4">4 品</option>
            <option value="5" selected>5 品</option>
            <option value="6">6 品</option>
            <option value="7">7 品</option>
            <option value="8">8 品</option>
          </select>
        </div>
      </section>

      <section class="panel fretboard-shell" aria-label="吉他指板">
        <div class="section-header">
          <h2>指板</h2>
          <div class="readout" id="positionReadout">把位：5-9 品</div>
        </div>
        <div class="fretboard-scroll">
          <div class="fretboard" id="fretboard"></div>
        </div>
      </section>

      <section class="panel summary-grid" aria-label="当前音阶">
        <div class="summary-block">
          <h3>音阶音</h3>
          <div class="chips" id="scaleNotes"></div>
        </div>
        <div class="summary-block">
          <h3>唱名与音级</h3>
          <div class="chips" id="scaleDegrees"></div>
        </div>
      </section>

      <section class="legend" aria-label="图例">
        <span class="legend-item"><span class="legend-swatch position"></span>把位内音阶音</span>
        <span class="legend-item"><span class="legend-swatch root"></span>主音</span>
        <span class="legend-item"><span class="legend-swatch scale"></span>把位外音阶音</span>
      </section>
    </section>

    <section id="rhythmMode" class="mode-view" hidden>
      <section class="panel controls rhythm-controls" aria-label="节奏练习控制">
        <div class="control">
          <label for="practiceDuration">练习时间</label>
          <select id="practiceDuration">
            <option value="30">30 秒</option>
            <option value="60" selected>60 秒</option>
            <option value="90">90 秒</option>
            <option value="120">120 秒</option>
            <option value="180">180 秒</option>
          </select>
        </div>
        <div class="control">
          <label for="exerciseBeats">题目长度</label>
          <select id="exerciseBeats">
            <option value="1">1 拍</option>
            <option value="2">2 拍</option>
            <option value="4" selected>1 小节</option>
          </select>
        </div>
        <div class="control">
          <label for="tabString">六线谱弦位</label>
          <select id="tabString">
            <option value="1">1弦 E</option>
            <option value="2">2弦 B</option>
            <option value="3" selected>3弦 G</option>
            <option value="4">4弦 D</option>
            <option value="5">5弦 A</option>
            <option value="6">6弦 E</option>
          </select>
        </div>
        <div class="control">
          <label for="tabFret">六线谱品格</label>
          <input id="tabFret" type="number" min="0" max="24" value="0" inputmode="numeric">
        </div>
        <div class="control">
          <label for="bpmInput">节拍器 BPM</label>
          <input id="bpmInput" type="number" min="40" max="240" value="80" inputmode="numeric">
        </div>
        <div class="control">
          <label>出题</label>
          <div class="button-row">
            <button id="startPractice" class="action-button" type="button">开始</button>
            <button id="nextQuestion" class="action-button secondary" type="button">下一题</button>
          </div>
        </div>
        <div class="control">
          <label>练习辅助</label>
          <div class="button-row">
            <button id="toggleAnswer" class="action-button secondary" type="button">答案</button>
            <button id="toggleAutoNext" class="action-button secondary" type="button">自动下一题</button>
          </div>
        </div>
      </section>

      <section class="rhythm-status" aria-label="练习状态">
        <div class="status-box">
          <span>剩余时间</span>
          <strong id="timeLeft">60s</strong>
        </div>
        <div class="status-box">
          <span>题目</span>
          <strong id="questionCount">0</strong>
        </div>
        <div class="status-box">
          <span>当前组合</span>
          <strong id="currentPattern">-</strong>
        </div>
        <div class="status-box">
          <span>节拍器</span>
          <strong id="metronomeStatus">80 BPM</strong>
        </div>
      </section>

      <section class="panel notation-panel" aria-label="五线谱和吉他六线谱">
        <div class="section-header">
          <h2>谱面</h2>
          <div class="readout" id="exerciseReadout">随机十六分组合</div>
        </div>
        <div class="notation-scroll">
          <div id="notationMount"></div>
        </div>
      </section>

      <section id="answerPanel" class="panel answer-panel" aria-label="弹奏答案" hidden>
        <h3>答案</h3>
        <p class="answer-text" id="answerText"></p>
      </section>

      <section class="panel pattern-bank" aria-label="十六分组合题库">
        <h3>组合题库</h3>
        <div class="chips" id="patternBank"></div>
      </section>
    </section>
  </main>

  <script>
    const pitchNames = [
      "C", "C# / Db", "D", "D# / Eb", "E", "F",
      "F# / Gb", "G", "G# / Ab", "A", "A# / Bb", "B"
    ];

    const roots = pitchNames.map((name, pc) => ({ name, pc }));

    const modes = [
      { name: "Ionian", zh: "自然大调", intervals: [0, 2, 4, 5, 7, 9, 11] },
      { name: "Dorian", zh: "多利亚", intervals: [0, 2, 3, 5, 7, 9, 10] },
      { name: "Phrygian", zh: "弗里几亚", intervals: [0, 1, 3, 5, 7, 8, 10] },
      { name: "Lydian", zh: "利底亚", intervals: [0, 2, 4, 6, 7, 9, 11] },
      { name: "Mixolydian", zh: "混合利底亚", intervals: [0, 2, 4, 5, 7, 9, 10] },
      { name: "Aeolian", zh: "自然小调", intervals: [0, 2, 3, 5, 7, 8, 10] },
      { name: "Locrian", zh: "洛克里亚", intervals: [0, 1, 3, 5, 6, 8, 10] }
    ];

    const intervalMeta = {
      0: { degree: "1", solfege: "Do" },
      1: { degree: "b2", solfege: "Ra" },
      2: { degree: "2", solfege: "Re" },
      3: { degree: "b3", solfege: "Me" },
      4: { degree: "3", solfege: "Mi" },
      5: { degree: "4", solfege: "Fa" },
      6: { degree: "#4 / b5", solfege: "Fi / Se" },
      7: { degree: "5", solfege: "Sol" },
      8: { degree: "b6", solfege: "Le" },
      9: { degree: "6", solfege: "La" },
      10: { degree: "b7", solfege: "Te" },
      11: { degree: "7", solfege: "Ti" }
    };

    const strings = [
      { number: 1, label: "E", pc: 4, midi: 64 },
      { number: 2, label: "B", pc: 11, midi: 59 },
      { number: 3, label: "G", pc: 7, midi: 55 },
      { number: 4, label: "D", pc: 2, midi: 50 },
      { number: 5, label: "A", pc: 9, midi: 45 },
      { number: 6, label: "E", pc: 4, midi: 40 }
    ];

    const rhythmPatterns = [
      { id: "quarter", name: "四分音符", count: "1", durations: [4] },
      { id: "eighth-eighth", name: "两个八分", count: "1 &", durations: [2, 2] },
      { id: "four-sixteenths", name: "四个十六分", count: "1 e & a", durations: [1, 1, 1, 1] },
      { id: "eighth-two-sixteenths", name: "前八后十六", count: "1 & a", durations: [2, 1, 1] },
      { id: "two-sixteenths-eighth", name: "前十六后八", count: "1 e &", durations: [1, 1, 2] },
      { id: "sixteenth-eighth-sixteenth", name: "十六-八-十六", count: "1 e a", durations: [1, 2, 1] },
      { id: "dotted-eighth-sixteenth", name: "附点八分+十六", count: "1 a", durations: [3, 1] },
      { id: "sixteenth-dotted-eighth", name: "十六+附点八分", count: "1 e", durations: [1, 3] }
    ];

    const fretCount = 24;
    let activeMode = "scale";
    let practiceTimer = null;
    let practiceActive = false;
    let remainingSeconds = 60;
    let questionTotal = 0;
    let currentExercise = [];
    let answerVisible = false;
    let metronomeActive = false;
    let metronomeTimer = null;
    let metronomeBeat = 0;
    let metronomeBeatStart = 0;
    let progressFrame = null;
    let exerciseCycleStart = 0;
    let autoNextEnabled = false;
    let autoNextCycle = -1;
    let committedBpm = 80;
    let audioContext = null;

    const elements = {
      currentLabel: document.getElementById("currentLabel"),
      currentValue: document.getElementById("currentValue"),
      modeTabs: Array.from(document.querySelectorAll(".mode-tab")),
      scaleMode: document.getElementById("scaleMode"),
      rhythmMode: document.getElementById("rhythmMode"),
      rootSelect: document.getElementById("rootSelect"),
      modeSelect: document.getElementById("modeSelect"),
      startFret: document.getElementById("startFret"),
      startFretNumber: document.getElementById("startFretNumber"),
      spanSelect: document.getElementById("spanSelect"),
      positionReadout: document.getElementById("positionReadout"),
      fretboard: document.getElementById("fretboard"),
      scaleNotes: document.getElementById("scaleNotes"),
      scaleDegrees: document.getElementById("scaleDegrees"),
      practiceDuration: document.getElementById("practiceDuration"),
      exerciseBeats: document.getElementById("exerciseBeats"),
      tabString: document.getElementById("tabString"),
      tabFret: document.getElementById("tabFret"),
      bpmInput: document.getElementById("bpmInput"),
      startPractice: document.getElementById("startPractice"),
      nextQuestion: document.getElementById("nextQuestion"),
      toggleAnswer: document.getElementById("toggleAnswer"),
      toggleAutoNext: document.getElementById("toggleAutoNext"),
      timeLeft: document.getElementById("timeLeft"),
      questionCount: document.getElementById("questionCount"),
      currentPattern: document.getElementById("currentPattern"),
      metronomeStatus: document.getElementById("metronomeStatus"),
      exerciseReadout: document.getElementById("exerciseReadout"),
      notationMount: document.getElementById("notationMount"),
      answerPanel: document.getElementById("answerPanel"),
      answerText: document.getElementById("answerText"),
      patternBank: document.getElementById("patternBank")
    };

    function initControls() {
      roots.forEach((root) => {
        const option = document.createElement("option");
        option.value = String(root.pc);
        option.textContent = root.name;
        elements.rootSelect.append(option);
      });

      modes.forEach((mode) => {
        const option = document.createElement("option");
        option.value = mode.name;
        option.textContent = `${mode.name} - ${mode.zh}`;
        elements.modeSelect.append(option);
      });

      const fragment = document.createDocumentFragment();
      rhythmPatterns.forEach((pattern) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${pattern.name} · ${pattern.count}`;
        fragment.append(chip);
      });
      elements.patternBank.replaceChildren(fragment);
    }

    function clampNumber(value, min, max) {
      if (!Number.isFinite(value)) {
        return min;
      }
      return Math.max(min, Math.min(max, Math.round(value)));
    }

    function intervalFromRoot(pc, rootPc) {
      return (pc - rootPc + 12) % 12;
    }

    function makeClassList(base, classes) {
      return [base, ...classes.filter(Boolean)].join(" ");
    }

    function getScaleState() {
      const rootPc = clampNumber(Number(elements.rootSelect.value), 0, 11);
      const start = clampNumber(Number(elements.startFret.value), 0, fretCount);
      const span = clampNumber(Number(elements.spanSelect.value), 4, 8);
      const end = Math.min(fretCount, start + span - 1);
      const mode = modes.find((item) => item.name === elements.modeSelect.value) || modes[0];

      return {
        rootPc,
        rootName: pitchNames[rootPc],
        mode,
        start,
        end,
        span
      };
    }

    function renderScaleMode() {
      const state = getScaleState();
      const intervalSet = new Set(state.mode.intervals);
      const visibleScaleIntervals = state.mode.intervals.map((interval) => ({
        interval,
        pc: (state.rootPc + interval) % 12,
        meta: intervalMeta[interval]
      }));

      elements.startFret.value = String(state.start);
      elements.startFretNumber.value = String(state.start);
      elements.positionReadout.textContent = `把位：${state.start}-${state.end} 品`;

      if (activeMode === "scale") {
        elements.currentLabel.textContent = "当前调式";
        elements.currentValue.textContent = `${state.rootName} ${state.mode.name}`;
      }

      renderFretboard(state, intervalSet);
      renderScaleSummary(visibleScaleIntervals);
    }

    function renderFretboard(state, intervalSet) {
      const fragment = document.createDocumentFragment();
      const corner = document.createElement("div");
      corner.className = "fret-label corner-label";
      corner.textContent = "弦 / 品";
      fragment.append(corner);

      for (let fret = 0; fret <= fretCount; fret += 1) {
        const label = document.createElement("div");
        const isPositionColumn = fret >= state.start && fret <= state.end;
        label.className = makeClassList("fret-label", [
          isPositionColumn && "position-column",
          fret === state.start && "position-start",
          fret === state.end && "position-end"
        ]);
        label.textContent = String(fret);
        fragment.append(label);
      }

      strings.forEach((string) => {
        const label = document.createElement("div");
        label.className = "string-label";
        label.innerHTML = `<span>${string.number}弦 ${string.label}</span><small>${string.number === 1 ? "高音" : string.number === 6 ? "低音" : "标准"}</small>`;
        fragment.append(label);

        for (let fret = 0; fret <= fretCount; fret += 1) {
          const pc = (string.pc + fret) % 12;
          const interval = intervalFromRoot(pc, state.rootPc);
          const inScale = intervalSet.has(interval);
          const inPosition = fret >= state.start && fret <= state.end;
          const isRoot = pc === state.rootPc && inScale;
          const meta = intervalMeta[interval];
          const cell = document.createElement("div");

          cell.className = makeClassList("fret-cell", [
            inPosition && "position-column",
            inScale && "scale-note",
            inScale && !inPosition && "outside-position",
            inPosition && "in-position",
            isRoot && "root-note",
            fret === state.start && "position-start",
            fret === state.end && "position-end"
          ]);

          cell.setAttribute(
            "aria-label",
            `${string.number}弦 ${fret}品 ${pitchNames[pc]}${inScale ? ` ${meta.solfege} ${meta.degree}` : ""}`
          );

          if (inScale) {
            cell.innerHTML = `
              <span class="note-name">${pitchNames[pc]}</span>
              <span class="solfege">${meta.solfege}</span>
              <span class="degree">${meta.degree}</span>
            `;
          }

          fragment.append(cell);
        }
      });

      elements.fretboard.replaceChildren(fragment);
    }

    function renderScaleSummary(scaleIntervals) {
      const noteFragment = document.createDocumentFragment();
      const degreeFragment = document.createDocumentFragment();

      scaleIntervals.forEach(({ interval, pc, meta }) => {
        const note = document.createElement("span");
        note.className = makeClassList("chip", [interval === 0 && "root-chip"]);
        note.textContent = pitchNames[pc];
        noteFragment.append(note);

        const degree = document.createElement("span");
        degree.className = makeClassList("chip", [interval === 0 && "root-chip"]);
        degree.textContent = `${meta.solfege} · ${meta.degree}`;
        degreeFragment.append(degree);
      });

      elements.scaleNotes.replaceChildren(noteFragment);
      elements.scaleDegrees.replaceChildren(degreeFragment);
    }

    function syncStartFret(value) {
      const nextValue = clampNumber(Number(value), 0, fretCount);
      elements.startFret.value = String(nextValue);
      elements.startFretNumber.value = String(nextValue);
      renderScaleMode();
    }

    function switchMode(nextMode) {
      activeMode = nextMode;
      elements.scaleMode.hidden = nextMode !== "scale";
      elements.rhythmMode.hidden = nextMode !== "rhythm";
      elements.modeTabs.forEach((tab) => {
        const isActive = tab.dataset.mode === nextMode;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-pressed", String(isActive));
      });

      if (nextMode === "scale") {
        renderScaleMode();
      } else {
        renderRhythmHeader();
        renderRhythmStatus();
        if (!currentExercise.length) {
          nextRhythmQuestion(false);
        }
        ensureMetronomeRunning();
      }
    }

    function renderRhythmHeader() {
      elements.currentLabel.textContent = "当前模式";
      elements.currentValue.textContent = "十六分节奏";
    }

    function getRhythmSettings() {
      return {
        seconds: clampNumber(Number(elements.practiceDuration.value), 30, 180),
        beats: clampNumber(Number(elements.exerciseBeats.value), 1, 4),
        tabString: clampNumber(Number(elements.tabString.value), 1, 6),
        tabFret: clampNumber(Number(elements.tabFret.value), 0, 24),
        bpm: committedBpm
      };
    }

    function commitBpmInput() {
      const nextBpm = clampNumber(Number(elements.bpmInput.value), 40, 240);
      committedBpm = nextBpm;
      elements.bpmInput.value = String(nextBpm);
      const settings = getRhythmSettings();
      if (metronomeActive) {
        restartRhythmPhase(settings);
      }
      renderRhythmStatus();
    }

    function getSelectedString(settings) {
      return strings.find((string) => string.number === settings.tabString) || strings[2];
    }

    function getSelectedNote(settings) {
      const string = getSelectedString(settings);
      const midi = string.midi + settings.tabFret;
      const pc = midi % 12;
      return {
        string,
        midi,
        pc,
        name: pitchNames[pc],
        writtenMidi: midi + 12,
        accidental: getAccidental(midi + 12)
      };
    }

    function randomPattern() {
      return rhythmPatterns[Math.floor(Math.random() * rhythmPatterns.length)];
    }

    function nextRhythmQuestion(countQuestion = true) {
      ensureMetronomeRunning();
      const settings = getRhythmSettings();
      currentExercise = Array.from({ length: settings.beats }, () => randomPattern());
      restartRhythmPhase(settings);
      if (countQuestion) {
        questionTotal += 1;
      }
      renderRhythmNotation(settings);
      renderRhythmStatus();
    }

    function startPractice() {
      ensureMetronomeRunning();
      if (practiceActive) {
        stopPractice();
        return;
      }

      const settings = getRhythmSettings();
      remainingSeconds = settings.seconds;
      questionTotal = 0;
      practiceActive = true;
      elements.startPractice.textContent = "停止";
      nextRhythmQuestion(true);
      renderRhythmStatus();

      practiceTimer = window.setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          stopPractice();
        }
        renderRhythmStatus();
      }, 1000);
    }

    function stopPractice() {
      practiceActive = false;
      elements.startPractice.textContent = "开始";
      if (practiceTimer) {
        window.clearInterval(practiceTimer);
        practiceTimer = null;
      }
      renderRhythmStatus();
    }

    function restartRhythmPhase(settings = getRhythmSettings()) {
      if (!audioContext) {
        return;
      }

      if (metronomeTimer) {
        window.clearInterval(metronomeTimer);
        metronomeTimer = null;
      }

      metronomeBeat = 0;
      metronomeBeatStart = audioContext.currentTime;
      exerciseCycleStart = metronomeBeatStart;
      autoNextCycle = -1;
      playMetronomeBeat(0);
      scheduleAnswerPulse(0);
      restartMetronomeTimer(settings.bpm);
      updateProgressCursor(settings);
    }

    function ensureMetronomeRunning() {
      if (metronomeActive) {
        return;
      }
      const settings = getRhythmSettings();
      ensureAudioContext();
      metronomeActive = true;
      metronomeBeat = 0;
      metronomeBeatStart = audioContext.currentTime;
      exerciseCycleStart = audioContext.currentTime;
      playMetronomeBeat(0);
      scheduleAnswerPulse(0);
      restartMetronomeTimer(settings.bpm);
      startProgressLoop();
      renderRhythmStatus();
    }

    function restartMetronomeTimer(bpm) {
      if (metronomeTimer) {
        window.clearInterval(metronomeTimer);
      }
      const interval = 60000 / bpm;
      metronomeTimer = window.setInterval(() => {
        metronomeBeat = (metronomeBeat + 1) % 4;
        metronomeBeatStart = audioContext.currentTime;
        playMetronomeBeat(metronomeBeat);
        scheduleAnswerPulse(metronomeBeat);
      }, interval);
    }

    function startProgressLoop() {
      if (progressFrame) {
        return;
      }

      const tick = () => {
        if (activeMode === "rhythm" && metronomeActive) {
          updateProgressCursor(getRhythmSettings());
        }
        progressFrame = window.requestAnimationFrame(tick);
      };

      progressFrame = window.requestAnimationFrame(tick);
    }

    function updateProgressCursor(settings) {
      const cursor = document.getElementById("progressCursor");
      if (!cursor || !audioContext) {
        return;
      }

      const secondsPerBeat = 60 / settings.bpm;
      const cycleBeats = Math.max(1, currentExercise.length || settings.beats);
      const cycleSeconds = cycleBeats * secondsPerBeat;
      const elapsed = Math.max(0, audioContext.currentTime - exerciseCycleStart);
      const cycleIndex = Math.floor(elapsed / cycleSeconds);
      const cyclePosition = elapsed % cycleSeconds;
      const progressBeats = cyclePosition / secondsPerBeat;
      cursor.setAttribute("transform", `translate(${progressToX(progressBeats)} 0)`);

      if (autoNextEnabled && cycleIndex > autoNextCycle && elapsed >= cycleSeconds) {
        autoNextCycle = cycleIndex;
        nextRhythmQuestion(true);
      }
    }

    function progressToX(progressBeats) {
      const subWidth = 30;
      const beatGap = 24;
      const xStart = 86;
      const beatWidth = subWidth * 4;
      const clampedBeats = Math.max(0, Math.min(4, progressBeats));
      const beatIndex = Math.min(3, Math.floor(clampedBeats));
      const beatProgress = clampedBeats - beatIndex;
      return xStart + beatIndex * (beatWidth + beatGap) + beatProgress * beatWidth - 12;
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playMetronomeBeat(beatIndex) {
      const isStrong = beatIndex === 0;
      playMetronomeClick(audioContext.currentTime, isStrong);
    }

    function scheduleAnswerPulse(beatIndex) {
      if (!answerVisible || !currentExercise.length || !audioContext) {
        return;
      }

      const settings = getRhythmSettings();
      const pattern = currentExercise[beatIndex % currentExercise.length];
      if (!pattern) {
        return;
      }

      const secondsPerSixteenth = 60 / settings.bpm / 4;
      let cursor = 0;
      pattern.durations.forEach((duration, noteIndex) => {
        const time = audioContext.currentTime + cursor * secondsPerSixteenth;
        playAnswerDa(time, beatIndex === 0 && noteIndex === 0);
        cursor += duration;
      });
    }

    function playDa(time, options) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      osc.type = "square";
      osc.frequency.setValueAtTime(options.frequency, time);
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(options.frequency, time);
      filter.Q.setValueAtTime(6, time);
      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(options.gain, time + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + options.duration);
      osc.connect(filter).connect(gain).connect(audioContext.destination);
      osc.start(time);
      osc.stop(time + options.duration + 0.02);
    }

    function playMetronomeClick(time, isStrong) {
      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      const duration = isStrong ? 0.034 : 0.026;
      const buffer = audioContext.createBuffer(1, Math.max(1, Math.floor(audioContext.sampleRate * duration)), audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) {
        const decay = Math.pow(1 - i / data.length, 2.8);
        data[i] = (Math.random() * 2 - 1) * decay;
      }
      source.buffer = buffer;
      filter.type = "highpass";
      filter.frequency.setValueAtTime(isStrong ? 3600 : 4300, time);
      filter.Q.setValueAtTime(0.8, time);
      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(isStrong ? 0.34 : 0.18, time + 0.002);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
      source.connect(filter).connect(gain).connect(audioContext.destination);
      source.start(time);
      source.stop(time + duration + 0.01);
    }

    function playAnswerDa(time, isStrong) {
      const consonant = audioContext.createBufferSource();
      const consonantGain = audioContext.createGain();
      const consonantFilter = audioContext.createBiquadFilter();
      const buffer = audioContext.createBuffer(1, Math.max(1, Math.floor(audioContext.sampleRate * 0.024)), audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      consonant.buffer = buffer;
      consonantFilter.type = "bandpass";
      consonantFilter.frequency.setValueAtTime(isStrong ? 2600 : 2200, time);
      consonantFilter.Q.setValueAtTime(3.4, time);
      consonantGain.gain.setValueAtTime(0.0001, time);
      consonantGain.gain.exponentialRampToValueAtTime(isStrong ? 0.24 : 0.15, time + 0.004);
      consonantGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.026);
      consonant.connect(consonantFilter).connect(consonantGain).connect(audioContext.destination);
      consonant.start(time);
      consonant.stop(time + 0.032);

      const vowel = audioContext.createOscillator();
      const vowelGain = audioContext.createGain();
      const vowelFilter = audioContext.createBiquadFilter();
      vowel.type = "sawtooth";
      vowel.frequency.setValueAtTime(isStrong ? 190 : 175, time + 0.012);
      vowel.frequency.exponentialRampToValueAtTime(isStrong ? 150 : 138, time + 0.095);
      vowelFilter.type = "bandpass";
      vowelFilter.frequency.setValueAtTime(isStrong ? 760 : 690, time + 0.012);
      vowelFilter.Q.setValueAtTime(7, time + 0.012);
      vowelGain.gain.setValueAtTime(0.0001, time + 0.012);
      vowelGain.gain.exponentialRampToValueAtTime(isStrong ? 0.22 : 0.13, time + 0.025);
      vowelGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.105);
      vowel.connect(vowelFilter).connect(vowelGain).connect(audioContext.destination);
      vowel.start(time + 0.012);
      vowel.stop(time + 0.12);
    }

    function toggleAnswer() {
      answerVisible = !answerVisible;
      renderRhythmNotation(getRhythmSettings());
      renderRhythmStatus();
    }

    function toggleAutoNext() {
      autoNextEnabled = !autoNextEnabled;
      autoNextCycle = -1;
      if (audioContext) {
        exerciseCycleStart = audioContext.currentTime;
      }
      renderRhythmStatus();
    }

    function renderRhythmStatus() {
      const settings = getRhythmSettings();
      const selectedNote = getSelectedNote(settings);
      const shownTime = practiceActive || remainingSeconds !== 0 ? remainingSeconds : settings.seconds;
      elements.timeLeft.textContent = `${shownTime}s`;
      elements.questionCount.textContent = String(questionTotal);
      elements.currentPattern.textContent = currentExercise.length === 1 ? currentExercise[0].name : `${currentExercise.length} 拍`;
      elements.metronomeStatus.textContent = `${settings.bpm} BPM`;
      elements.toggleAnswer.classList.toggle("active", answerVisible);
      elements.toggleAutoNext.classList.toggle("active", autoNextEnabled);
      elements.toggleAutoNext.textContent = autoNextEnabled ? "自动中" : "自动下一题";
      elements.exerciseReadout.textContent = currentExercise.map((pattern, index) => `${index + 1}: ${pattern.name}`).join(" / ") || "随机十六分组合";
      elements.answerPanel.hidden = !answerVisible;
      elements.answerText.textContent = buildAnswerText(settings, selectedNote);
    }

    function buildAnswerText(settings, selectedNote) {
      if (!currentExercise.length) {
        return "先生成一道题。";
      }

      const parts = currentExercise.map((pattern, index) => {
        return `第 ${index + 1} 拍：按 ${pattern.count} 弹 ${pattern.name}`;
      });
      return `用 ${selectedNote.string.number}弦 ${settings.tabFret} 品（${selectedNote.name}，吉他谱实际音高，五线谱按吉他记谱高八度显示）弹。${parts.join("；")}。节拍器强拍为第 1 拍，其他拍为弱拍；答案声音会在每个需要拨弦的位置发“哒”。`;
    }

    function renderRhythmNotation(settings) {
      const selectedNote = getSelectedNote(settings);
      const events = buildRhythmEvents(settings, selectedNote);
      const staffTop = 112;
      const staffGap = 10;
      const tabTop = 230;
      const tabGap = 10;
      const subWidth = 30;
      const beatGap = 24;
      const xStart = 86;
      const beatWidth = subWidth * 4;
      const displayBeats = 4;
      const width = xStart + displayBeats * beatWidth + (displayBeats - 1) * beatGap + 70;
      const height = 342;
      const tabLineIndex = settings.tabString - 1;
      const tabY = tabTop + tabLineIndex * tabGap;
      const beams = [];
      const tabBeams = [];

      currentExercise.forEach((pattern, beatIndex) => {
        const beatNotes = events.filter((event) => event.beatIndex === beatIndex);
        beams.push(...buildBeamSegments(beatNotes));
        tabBeams.push(...buildBeamSegments(beatNotes));
      });

      const lines = [];
      lines.push(`<svg class="notation" viewBox="0 0 ${width} ${height}" role="img" aria-label="十六分节奏五线谱与吉他六线谱">`);
      lines.push(`<rect x="0" y="0" width="${width}" height="${height}" rx="8" fill="#fffdf9"/>`);

      for (let i = 0; i < 5; i += 1) {
        const y = staffTop + i * staffGap;
        lines.push(`<line x1="64" y1="${y}" x2="${width - 24}" y2="${y}" stroke="#202124" stroke-width="1"/>`);
      }

      lines.push(`<text x="20" y="${staffTop + 42}" font-family="Georgia, serif" font-size="42" fill="#202124">𝄞</text>`);
      lines.push(`<text x="58" y="${staffTop + 19}" font-size="18" font-weight="760" fill="#202124">4</text>`);
      lines.push(`<text x="58" y="${staffTop + 39}" font-size="18" font-weight="760" fill="#202124">4</text>`);

      for (let i = 0; i < 6; i += 1) {
        const y = tabTop + i * tabGap;
        lines.push(`<line x1="64" y1="${y}" x2="${width - 24}" y2="${y}" stroke="#202124" stroke-width="1"/>`);
      }

      lines.push(`<text x="18" y="${tabTop + 35}" font-size="24" font-weight="800" fill="#202124">TAB</text>`);

      for (let beatIndex = 0; beatIndex < displayBeats; beatIndex += 1) {
        const pattern = currentExercise[beatIndex];
        const x = xStart + beatIndex * (beatWidth + beatGap);
        lines.push(`<line x1="${x - 12}" y1="${staffTop}" x2="${x - 12}" y2="${staffTop + staffGap * 4}" stroke="#202124" stroke-width="1"/>`);
        lines.push(`<line x1="${x - 12}" y1="${tabTop}" x2="${x - 12}" y2="${tabTop + tabGap * 5}" stroke="#202124" stroke-width="1"/>`);
        if (pattern) {
          lines.push(`<text x="${x}" y="${height - 22}" font-size="12" fill="#6d6a62">${pattern.count}</text>`);
        }
      }

      lines.push(`<line x1="${width - 28}" y1="${staffTop}" x2="${width - 28}" y2="${staffTop + staffGap * 4}" stroke="#202124" stroke-width="2"/>`);
      lines.push(`<line x1="${width - 28}" y1="${tabTop}" x2="${width - 28}" y2="${tabTop + tabGap * 5}" stroke="#202124" stroke-width="2"/>`);

      events.forEach((note) => {
        const stemX = note.x + 7;
        const stemTop = note.staffY - 38;
        drawLedgerLines(lines, note.x, note.staffY, staffTop, staffTop + staffGap * 4, staffGap);
        if (selectedNote.accidental) {
          lines.push(`<text x="${note.x - 20}" y="${note.staffY + 5}" font-size="18" font-weight="760" fill="#202124">${selectedNote.accidental}</text>`);
        }
        lines.push(`<ellipse cx="${note.x}" cy="${note.staffY}" rx="7.2" ry="5.1" transform="rotate(-20 ${note.x} ${note.staffY})" fill="#202124"/>`);
        lines.push(`<line x1="${stemX}" y1="${note.staffY}" x2="${stemX}" y2="${stemTop}" stroke="#202124" stroke-width="1.7"/>`);
        if (note.duration === 3) {
          lines.push(`<circle cx="${note.x + 14}" cy="${note.staffY - 1}" r="1.8" fill="#202124"/>`);
        }
        if (note.duration < 4 && !beams.some((beam) => beam.notes.includes(note))) {
          const hook = note.duration === 1 ? 16 : 12;
          lines.push(`<path d="M ${stemX} ${stemTop} q ${hook} 4 ${hook} 14" fill="none" stroke="#202124" stroke-width="2"/>`);
          if (note.duration === 1) {
            lines.push(`<path d="M ${stemX} ${stemTop + 8} q ${hook} 4 ${hook} 14" fill="none" stroke="#202124" stroke-width="2"/>`);
          }
        }
        lines.push(`<rect x="${note.x - 9}" y="${tabY - 7}" width="18" height="14" fill="#fffdf9"/>`);
        lines.push(`<text x="${note.x}" y="${tabY + 5}" text-anchor="middle" font-size="14" font-weight="760" fill="#202124">${settings.tabFret}</text>`);
        lines.push(`<line x1="${stemX}" y1="${tabY + 8}" x2="${stemX}" y2="${tabTop - 26}" stroke="#202124" stroke-width="1.7"/>`);
        if (note.duration === 3) {
          lines.push(`<circle cx="${note.x + 14}" cy="${tabY + 1}" r="1.8" fill="#202124"/>`);
        }
      });

      beams.forEach((beam) => {
        drawBeam(lines, beam, beam.notes[0].staffY - 38 + beam.level * 8);
      });

      tabBeams.forEach((beam) => {
        drawBeam(lines, beam, tabTop - 26 + beam.level * 8);
      });

      lines.push(`<g id="progressCursor" transform="translate(${progressToX(0)} 0)">`);
      lines.push(`<line x1="0" y1="${staffTop - 18}" x2="0" y2="${tabTop + tabGap * 5 + 18}" stroke="#bd4b32" stroke-width="3" stroke-linecap="round"/>`);
      lines.push(`<circle cx="0" cy="${staffTop - 24}" r="5" fill="#bd4b32"/>`);
      lines.push(`</g>`);
      lines.push(`</svg>`);
      elements.notationMount.innerHTML = lines.join("");
      updateProgressCursor(settings);
    }

    function buildRhythmEvents(settings, selectedNote) {
      const subWidth = 30;
      const beatGap = 24;
      const xStart = 86;
      const beatWidth = subWidth * 4;
      const staffY = midiToStaffY(selectedNote.writtenMidi);
      const events = [];

      currentExercise.forEach((pattern, beatIndex) => {
        const beatX = xStart + beatIndex * (beatWidth + beatGap);
        let cursor = 0;
        pattern.durations.forEach((duration) => {
          events.push({
            x: beatX + cursor * subWidth,
            staffY,
            duration,
            beatIndex,
            onset: cursor,
            pulse: beatIndex * 4 + cursor
          });
          cursor += duration;
        });
      });

      return events;
    }

    function midiToStaffY(midi) {
      const staffTop = 112;
      const staffGap = 10;
      const bottomLineY = staffTop + staffGap * 4;
      const bottomLineStep = diatonicStep(64);
      const noteStep = diatonicStep(midi);
      return bottomLineY - (noteStep - bottomLineStep) * (staffGap / 2);
    }

    function diatonicStep(midi) {
      const pcToStep = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
      const pc = ((midi % 12) + 12) % 12;
      const octave = Math.floor(midi / 12) - 1;
      return octave * 7 + pcToStep[pc];
    }

    function getAccidental(midi) {
      const pc = ((midi % 12) + 12) % 12;
      return [1, 3, 6, 8, 10].includes(pc) ? "#" : "";
    }

    function drawLedgerLines(lines, x, y, top, bottom, gap) {
      for (let ledgerY = bottom + gap; ledgerY <= y + 0.1; ledgerY += gap) {
        lines.push(`<line x1="${x - 14}" y1="${ledgerY}" x2="${x + 14}" y2="${ledgerY}" stroke="#202124" stroke-width="1"/>`);
      }
      for (let ledgerY = top - gap; ledgerY >= y - 0.1; ledgerY -= gap) {
        lines.push(`<line x1="${x - 14}" y1="${ledgerY}" x2="${x + 14}" y2="${ledgerY}" stroke="#202124" stroke-width="1"/>`);
      }
    }

    function drawBeam(lines, beam, y) {
      const first = beam.notes[0];
      const last = beam.notes[beam.notes.length - 1];
      const x1 = first.x + 7;
      const x2 = last.x + 7;
      if (x1 === x2) {
        const direction = first.onset >= 2 ? -1 : 1;
        lines.push(`<rect x="${direction > 0 ? x1 : x1 - 14}" y="${y}" width="14" height="4.5" fill="#202124"/>`);
      } else {
        lines.push(`<rect x="${x1}" y="${y}" width="${x2 - x1}" height="4.5" fill="#202124"/>`);
      }
    }

    function buildBeamSegments(beatNotes) {
      const beams = [];
      const beamedNotes = beatNotes.filter((note) => note.duration < 4);
      if (beamedNotes.length >= 2) {
        beams.push({ level: 0, notes: beamedNotes });
      }

      const sixteenthNotes = beatNotes.filter((note) => note.duration === 1);
      sixteenthNotes.forEach((note, index) => {
        const previous = sixteenthNotes[index - 1];
        const next = sixteenthNotes[index + 1];
        const connectedToPrevious = previous && previous.onset + previous.duration === note.onset;
        const connectedToNext = next && note.onset + note.duration === next.onset;
        if (connectedToNext) {
          beams.push({ level: 1, notes: [note, next] });
        } else if (!connectedToPrevious) {
          beams.push({ level: 1, notes: [note] });
        }
      });

      return beams;
    }

    function bindEvents() {
      elements.modeTabs.forEach((tab) => {
        tab.addEventListener("click", () => switchMode(tab.dataset.mode));
      });
      elements.rootSelect.addEventListener("change", renderScaleMode);
      elements.modeSelect.addEventListener("change", renderScaleMode);
      elements.spanSelect.addEventListener("change", renderScaleMode);
      elements.startFret.addEventListener("input", (event) => syncStartFret(event.target.value));
      elements.startFretNumber.addEventListener("input", (event) => syncStartFret(event.target.value));
      elements.practiceDuration.addEventListener("change", () => {
        ensureMetronomeRunning();
        if (!practiceActive) {
          remainingSeconds = getRhythmSettings().seconds;
        }
        renderRhythmStatus();
      });
      elements.exerciseBeats.addEventListener("change", () => nextRhythmQuestion(false));
      elements.tabString.addEventListener("change", () => {
        ensureMetronomeRunning();
        renderRhythmNotation(getRhythmSettings());
        renderRhythmStatus();
      });
      elements.tabFret.addEventListener("input", () => {
        ensureMetronomeRunning();
        const settings = getRhythmSettings();
        elements.tabFret.value = String(settings.tabFret);
        renderRhythmNotation(settings);
        renderRhythmStatus();
      });
      elements.bpmInput.addEventListener("input", () => {
        const rawValue = elements.bpmInput.value.trim();
        if (rawValue === "") {
          elements.metronomeStatus.textContent = `${committedBpm} BPM`;
          return;
        }
        const preview = Number(rawValue);
        elements.metronomeStatus.textContent = Number.isFinite(preview) ? `${Math.round(preview)} BPM` : `${committedBpm} BPM`;
      });
      elements.bpmInput.addEventListener("change", commitBpmInput);
      elements.bpmInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commitBpmInput();
          elements.bpmInput.blur();
        }
      });
      elements.startPractice.addEventListener("click", startPractice);
      elements.nextQuestion.addEventListener("click", () => nextRhythmQuestion(true));
      elements.toggleAnswer.addEventListener("click", () => {
        ensureMetronomeRunning();
        toggleAnswer();
      });
      elements.toggleAutoNext.addEventListener("click", () => {
        ensureMetronomeRunning();
        toggleAutoNext();
      });
    }

    initControls();
    bindEvents();
    remainingSeconds = getRhythmSettings().seconds;
    renderScaleMode();
  </script>
</body>
</html>
