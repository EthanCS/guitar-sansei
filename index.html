<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>吉他助教 - 调式指板推演</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --surface: #ffffff;
      --surface-2: #f1efe8;
      --ink: #202124;
      --muted: #6d6a62;
      --line: #d9d3c7;
      --wood: #9c5d37;
      --wood-dark: #65391f;
      --string: #6f7784;
      --fret: #d6c2a5;
      --scale: #e9f7f1;
      --scale-border: #4aa17b;
      --position: #fff4c8;
      --position-strong: #f3bd3d;
      --root: #234d9f;
      --root-bg: #e5edff;
      --outside: rgba(32, 33, 36, 0.36);
      --shadow: 0 18px 50px rgba(54, 41, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(247, 244, 238, 0.96)),
        var(--bg);
      color: var(--ink);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 780;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .current-key {
      min-width: 190px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .current-key span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .current-key strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
      gap: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .control {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .control label,
    .switch-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    select,
    input[type="number"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    select:focus,
    input[type="number"]:focus,
    input[type="range"]:focus-visible,
    .switch input:focus-visible + .switch-track {
      border-color: var(--root);
      box-shadow: 0 0 0 3px rgba(35, 77, 159, 0.16);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--root);
    }

    .range-pair {
      display: grid;
      grid-template-columns: 1fr 76px;
      align-items: center;
      gap: 10px;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      cursor: pointer;
      user-select: none;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      position: relative;
      width: 50px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      transition: background 160ms ease, border-color 160ms ease;
      flex: 0 0 auto;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.2);
      transition: transform 160ms ease;
    }

    .switch input:checked + .switch-track {
      border-color: var(--scale-border);
      background: var(--scale-border);
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(22px);
    }

    .fretboard-shell {
      overflow: hidden;
      margin-bottom: 16px;
    }

    .fretboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0;
    }

    .fretboard-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .position-readout {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .fretboard-scroll {
      overflow-x: auto;
      padding: 12px 16px 16px;
    }

    .fretboard {
      display: grid;
      grid-template-columns: 86px repeat(25, 64px);
      grid-auto-rows: 64px;
      min-width: 1686px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: linear-gradient(90deg, #7a4427, #a26239 38%, #8d5030);
    }

    .fret-label,
    .string-label,
    .fret-cell {
      position: relative;
      border-right: 1px solid rgba(255, 255, 255, 0.16);
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .fret-label {
      display: grid;
      place-items: center;
      background: #f2eadc;
      color: #4d463b;
      font-size: 13px;
      font-weight: 750;
    }

    .corner-label {
      align-content: center;
      padding: 0 10px;
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      color: var(--muted);
      background: #f7f2e7;
    }

    .string-label {
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 0 12px;
      color: #fff;
      background: rgba(54, 31, 18, 0.8);
      font-weight: 750;
    }

    .string-label small {
      color: rgba(255, 255, 255, 0.72);
      font-weight: 600;
    }

    .fret-cell {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 3px;
      padding: 6px 5px;
      min-width: 0;
      color: rgba(255, 255, 255, 0.42);
      isolation: isolate;
    }

    .fret-cell::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: rgba(225, 231, 234, 0.7);
      z-index: -1;
    }

    .fret-cell::after {
      content: "";
      position: absolute;
      inset: 8px 7px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      z-index: -1;
    }

    .fret-cell.scale-note::after {
      border: 1px solid rgba(74, 161, 123, 0.48);
      background: rgba(233, 247, 241, 0.86);
    }

    .fret-cell.in-position.scale-note::after {
      border: 2px solid var(--position-strong);
      background: #fff7db;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.75);
    }

    .fret-cell.root-note::after {
      border-color: var(--root);
      background: var(--root-bg);
      box-shadow: 0 0 0 2px rgba(35, 77, 159, 0.18);
    }

    .fret-cell.outside-position {
      opacity: 0.5;
    }

    .fret-cell.muted {
      opacity: 0.34;
    }

    .fret-cell.position-column {
      background: rgba(255, 244, 200, 0.16);
    }

    .fret-label.position-column {
      background: var(--position);
      color: #553b00;
    }

    .position-start {
      border-left: 3px solid var(--position-strong);
    }

    .position-end {
      border-right: 3px solid var(--position-strong);
    }

    .note-name {
      color: var(--ink);
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .root-note .note-name {
      color: var(--root);
    }

    .solfege {
      color: #31533f;
      font-size: 12px;
      line-height: 1;
      font-weight: 720;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .degree {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
    }

    .scale-summary {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 2fr;
      gap: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .summary-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.root-chip {
      border-color: rgba(35, 77, 159, 0.45);
      background: var(--root-bg);
      color: var(--root);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .legend-swatch.position {
      border-color: var(--position-strong);
      background: #fff7db;
    }

    .legend-swatch.root {
      border-color: var(--root);
      background: var(--root-bg);
    }

    .legend-swatch.scale {
      border-color: var(--scale-border);
      background: var(--scale);
    }

    @media (max-width: 980px) {
      .app {
        padding: 18px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .current-key {
        min-width: 0;
      }

      .controls,
      .scale-summary {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      .title-block h1 {
        font-size: 26px;
      }

      .controls,
      .scale-summary {
        grid-template-columns: 1fr;
      }

      .fretboard-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .fretboard-scroll {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <h1>吉他助教</h1>
        <p>调式推演、首调唱名、标准调弦 0-24 品</p>
      </div>
      <div class="current-key" aria-live="polite">
        <span>当前调式</span>
        <strong id="currentKey">C Ionian</strong>
      </div>
    </header>

    <section class="panel controls" aria-label="调式和把位控制">
      <div class="control">
        <label for="rootSelect">主音</label>
        <select id="rootSelect"></select>
      </div>
      <div class="control">
        <label for="modeSelect">调式</label>
        <select id="modeSelect"></select>
      </div>
      <div class="control">
        <label for="startFret">起始品</label>
        <div class="range-pair">
          <input id="startFret" type="range" min="0" max="24" value="5">
          <input id="startFretNumber" type="number" min="0" max="24" value="5" inputmode="numeric">
        </div>
      </div>
      <div class="control">
        <label for="spanSelect">跨度</label>
        <select id="spanSelect">
          <option value="4">4 品</option>
          <option value="5" selected>5 品</option>
          <option value="6">6 品</option>
        </select>
      </div>
      <div class="control">
        <span class="switch-label">高亮方式</span>
        <label class="switch">
          <input id="positionOnly" type="checkbox" checked>
          <span class="switch-track" aria-hidden="true"></span>
          <span>仅把位内</span>
        </label>
      </div>
    </section>

    <section class="panel fretboard-shell" aria-label="吉他指板">
      <div class="fretboard-header">
        <h2>指板</h2>
        <div class="position-readout" id="positionReadout">把位：5-9 品</div>
      </div>
      <div class="fretboard-scroll">
        <div class="fretboard" id="fretboard"></div>
      </div>
    </section>

    <section class="panel scale-summary" aria-label="当前音阶">
      <div class="summary-block">
        <h3>音阶音</h3>
        <div class="chips" id="scaleNotes"></div>
      </div>
      <div class="summary-block">
        <h3>唱名与音级</h3>
        <div class="chips" id="scaleDegrees"></div>
      </div>
    </section>

    <section class="legend" aria-label="图例">
      <span class="legend-item"><span class="legend-swatch position"></span>把位内音阶音</span>
      <span class="legend-item"><span class="legend-swatch root"></span>主音</span>
      <span class="legend-item"><span class="legend-swatch scale"></span>把位外音阶音</span>
    </section>
  </main>

  <script>
    const pitchNames = [
      "C", "C# / Db", "D", "D# / Eb", "E", "F",
      "F# / Gb", "G", "G# / Ab", "A", "A# / Bb", "B"
    ];

    const roots = pitchNames.map((name, pc) => ({ name, pc }));

    const modes = [
      { name: "Ionian", zh: "自然大调", intervals: [0, 2, 4, 5, 7, 9, 11] },
      { name: "Dorian", zh: "多利亚", intervals: [0, 2, 3, 5, 7, 9, 10] },
      { name: "Phrygian", zh: "弗里几亚", intervals: [0, 1, 3, 5, 7, 8, 10] },
      { name: "Lydian", zh: "利底亚", intervals: [0, 2, 4, 6, 7, 9, 11] },
      { name: "Mixolydian", zh: "混合利底亚", intervals: [0, 2, 4, 5, 7, 9, 10] },
      { name: "Aeolian", zh: "自然小调", intervals: [0, 2, 3, 5, 7, 8, 10] },
      { name: "Locrian", zh: "洛克里亚", intervals: [0, 1, 3, 5, 6, 8, 10] }
    ];

    const intervalMeta = {
      0: { degree: "1", solfege: "Do" },
      1: { degree: "b2", solfege: "Ra" },
      2: { degree: "2", solfege: "Re" },
      3: { degree: "b3", solfege: "Me" },
      4: { degree: "3", solfege: "Mi" },
      5: { degree: "4", solfege: "Fa" },
      6: { degree: "#4 / b5", solfege: "Fi / Se" },
      7: { degree: "5", solfege: "Sol" },
      8: { degree: "b6", solfege: "Le" },
      9: { degree: "6", solfege: "La" },
      10: { degree: "b7", solfege: "Te" },
      11: { degree: "7", solfege: "Ti" }
    };

    const strings = [
      { number: 1, label: "E", pc: 4 },
      { number: 2, label: "B", pc: 11 },
      { number: 3, label: "G", pc: 7 },
      { number: 4, label: "D", pc: 2 },
      { number: 5, label: "A", pc: 9 },
      { number: 6, label: "E", pc: 4 }
    ];

    const fretCount = 24;

    const elements = {
      rootSelect: document.getElementById("rootSelect"),
      modeSelect: document.getElementById("modeSelect"),
      startFret: document.getElementById("startFret"),
      startFretNumber: document.getElementById("startFretNumber"),
      spanSelect: document.getElementById("spanSelect"),
      positionOnly: document.getElementById("positionOnly"),
      currentKey: document.getElementById("currentKey"),
      positionReadout: document.getElementById("positionReadout"),
      fretboard: document.getElementById("fretboard"),
      scaleNotes: document.getElementById("scaleNotes"),
      scaleDegrees: document.getElementById("scaleDegrees")
    };

    function initControls() {
      roots.forEach((root) => {
        const option = document.createElement("option");
        option.value = String(root.pc);
        option.textContent = root.name;
        elements.rootSelect.append(option);
      });

      modes.forEach((mode) => {
        const option = document.createElement("option");
        option.value = mode.name;
        option.textContent = `${mode.name} - ${mode.zh}`;
        elements.modeSelect.append(option);
      });
    }

    function getState() {
      const rootPc = clampNumber(Number(elements.rootSelect.value), 0, 11);
      const start = clampNumber(Number(elements.startFret.value), 0, fretCount);
      const span = clampNumber(Number(elements.spanSelect.value), 4, 6);
      const end = Math.min(fretCount, start + span - 1);
      const mode = modes.find((item) => item.name === elements.modeSelect.value) || modes[0];

      return {
        rootPc,
        rootName: pitchNames[rootPc],
        mode,
        start,
        end,
        span,
        positionOnly: elements.positionOnly.checked
      };
    }

    function clampNumber(value, min, max) {
      if (!Number.isFinite(value)) {
        return min;
      }
      return Math.max(min, Math.min(max, Math.round(value)));
    }

    function intervalFromRoot(pc, rootPc) {
      return (pc - rootPc + 12) % 12;
    }

    function makeClassList(base, classes) {
      return [base, ...classes.filter(Boolean)].join(" ");
    }

    function render() {
      const state = getState();
      const intervalSet = new Set(state.mode.intervals);
      const visibleScaleIntervals = state.mode.intervals.map((interval) => ({
        interval,
        pc: (state.rootPc + interval) % 12,
        meta: intervalMeta[interval]
      }));

      elements.startFret.value = String(state.start);
      elements.startFretNumber.value = String(state.start);
      elements.currentKey.textContent = `${state.rootName} ${state.mode.name}`;
      elements.positionReadout.textContent = `把位：${state.start}-${state.end} 品`;

      renderFretboard(state, intervalSet);
      renderSummary(visibleScaleIntervals);
    }

    function renderFretboard(state, intervalSet) {
      const fragment = document.createDocumentFragment();
      const corner = document.createElement("div");
      corner.className = "fret-label corner-label";
      corner.textContent = "弦 / 品";
      fragment.append(corner);

      for (let fret = 0; fret <= fretCount; fret += 1) {
        const label = document.createElement("div");
        const isPositionColumn = fret >= state.start && fret <= state.end;
        label.className = makeClassList("fret-label", [
          isPositionColumn && "position-column",
          fret === state.start && "position-start",
          fret === state.end && "position-end"
        ]);
        label.textContent = String(fret);
        fragment.append(label);
      }

      strings.forEach((string) => {
        const label = document.createElement("div");
        label.className = "string-label";
        label.innerHTML = `<span>${string.number}弦 ${string.label}</span><small>${string.number === 1 ? "高音" : string.number === 6 ? "低音" : "标准"}</small>`;
        fragment.append(label);

        for (let fret = 0; fret <= fretCount; fret += 1) {
          const pc = (string.pc + fret) % 12;
          const interval = intervalFromRoot(pc, state.rootPc);
          const inScale = intervalSet.has(interval);
          const inPosition = fret >= state.start && fret <= state.end;
          const showScale = inScale && (!state.positionOnly || inPosition);
          const isRoot = pc === state.rootPc && showScale;
          const meta = intervalMeta[interval];
          const cell = document.createElement("div");

          cell.className = makeClassList("fret-cell", [
            inPosition && "position-column",
            inScale && showScale && "scale-note",
            inScale && !inPosition && !state.positionOnly && "outside-position",
            inScale && !showScale && "muted",
            inPosition && "in-position",
            isRoot && "root-note",
            fret === state.start && "position-start",
            fret === state.end && "position-end"
          ]);

          cell.setAttribute(
            "aria-label",
            `${string.number}弦 ${fret}品 ${pitchNames[pc]}${inScale ? ` ${meta.solfege} ${meta.degree}` : ""}`
          );

          if (showScale) {
            cell.innerHTML = `
              <span class="note-name">${pitchNames[pc]}</span>
              <span class="solfege">${meta.solfege}</span>
              <span class="degree">${meta.degree}</span>
            `;
          }

          fragment.append(cell);
        }
      });

      elements.fretboard.replaceChildren(fragment);
    }

    function renderSummary(scaleIntervals) {
      const noteFragment = document.createDocumentFragment();
      const degreeFragment = document.createDocumentFragment();

      scaleIntervals.forEach(({ interval, pc, meta }) => {
        const note = document.createElement("span");
        note.className = makeClassList("chip", [interval === 0 && "root-chip"]);
        note.textContent = pitchNames[pc];
        noteFragment.append(note);

        const degree = document.createElement("span");
        degree.className = makeClassList("chip", [interval === 0 && "root-chip"]);
        degree.textContent = `${meta.solfege} · ${meta.degree}`;
        degreeFragment.append(degree);
      });

      elements.scaleNotes.replaceChildren(noteFragment);
      elements.scaleDegrees.replaceChildren(degreeFragment);
    }

    function syncStartFret(value) {
      const nextValue = clampNumber(Number(value), 0, fretCount);
      elements.startFret.value = String(nextValue);
      elements.startFretNumber.value = String(nextValue);
      render();
    }

    function bindEvents() {
      elements.rootSelect.addEventListener("change", render);
      elements.modeSelect.addEventListener("change", render);
      elements.spanSelect.addEventListener("change", render);
      elements.positionOnly.addEventListener("change", render);
      elements.startFret.addEventListener("input", (event) => syncStartFret(event.target.value));
      elements.startFretNumber.addEventListener("input", (event) => syncStartFret(event.target.value));
    }

    initControls();
    bindEvents();
    render();
  </script>
</body>
</html>
